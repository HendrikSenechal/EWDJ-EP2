<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<header th:fragment="header">

    <nav style="display:flex; align-items:center; gap:1rem;">

        <a th:text="#{navbar.matches}"
           th:href="@{/matches/list}">
        </a>

        <a th:text="#{navbar.teams}"
           th:href="@{/teams/list}">
        </a>

        <a th:text="#{navbar.predictions}"
           th:href="@{/predictions/list}">
        </a>

        <span style="margin-left:auto;">
            Logged in as:
            <strong sec:authentication="name"></strong>
            |
            Roles:
            <strong sec:authentication="principal.authorities"></strong>
        </span>

        <form th:action="@{/logout}" method="post" style="display:inline;">

            <button type="submit">
                Logout
            </button>

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

        </form>

    </nav>

</header>

</html>
