<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<nav>
    <a th:href="@{/users/login}">Login</a>
    <a th:href="@{/users/registration}">Register</a>
</nav>

<div class="login-container">

    <h2>Login</h2>

    <form th:action="@{/users/login}" th:object="${inputLoginDTO}" method="post">


        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" />
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
        </div>

        <br/>

        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" th:field="*{password}" />
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
        </div>

        <button type="submit">Login</button>
    </form>
    <span th:if="${errCode}" th:text="${errMsg}" class="error"></span>
    <span th:if="${errCode}" th:text="${email}" class="error"></span>
</div>

</body>
</html>
