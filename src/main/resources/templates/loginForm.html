<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- Header Fragment -->
<div th:replace="fragments/guestHeader :: header"></div>

<form method="get">

    <select name="lang"
            onchange="this.form.submit()">

        <option value="en"
                th:selected="${#locale.language == 'en'}">
            English
        </option>

        <option value="nl"
                th:selected="${#locale.language == 'nl'}">
            Nederlands
        </option>

    </select>

</form>

<div class="login-container">

    <h2 th:text="#{login.title}" ></h2>

    <form th:action="@{/users/login}" th:object="${inputLoginDTO}" method="post">


        <div class="form-group">
            <label th:text="#{login.email}" for="email"></label>
            <input id="email" type="email" name="email">
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
        </div>

        <br/>

        <div>
            <label th:text="#{login.password}" for="password"></label>
            <input id="password" type="password" name="password">
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
        </div>

        <button th:text="#{login.confirm}" type="submit"></button>

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">
    </form>
    <span th:if="${errCode}" th:text="${errMsg}" class="error"></span>
    <span th:if="${errCode}" th:text="${email}" class="error"></span>
</div>

<!-- Footer Fragment -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
