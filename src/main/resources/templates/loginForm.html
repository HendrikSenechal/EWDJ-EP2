<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        .error {
            color: red;
            font-size: 14px;
        }
    </style>
</head>
<body>

<nav>
    <a th:text="#{navbar.login}" th:href="@{/users/login}"></a>
    <a th:text="#{navbar.register}" th:href="@{/users/registration}"></a>
</nav>

<form method="get">

    <select name="lang"
            onchange="this.form.submit()">

        <option value="en"
                th:selected="${#locale.language == 'en'}">
            English
        </option>

        <option value="nl"
                th:selected="${#locale.language == 'nl'}">
            Nederlands
        </option>

    </select>

</form>

<div class="login-container">

    <h2 th:text="#{login.title}" ></h2>

    <form th:action="@{/users/login}" th:object="${inputLoginDTO}" method="post">


        <div class="form-group">
            <label th:text="#{login.email}" for="email"></label>
            <input type="email" id="email" th:field="*{email}" />
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
        </div>

        <br/>

        <div>
            <label th:text="#{login.password}" for="password"></label>
            <input type="password" id="password" th:field="*{password}" />
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>
        </div>

        <button th:text="#{login.confirm}" type="submit"></button>
    </form>
    <span th:if="${errCode}" th:text="${errMsg}" class="error"></span>
    <span th:if="${errCode}" th:text="${email}" class="error"></span>
</div>

</body>
</html>
