<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1">
    <title>Create User</title>

    <style>
        .error {
            color: red;
            font-size: 14px;
        }
    </style>

</head>
<body>

<nav>
    <a th:href="@{/users/login}">Login</a>
    <a th:href="@{/users/register}">Register</a>
</nav>

<div class="container">

    <h2>Create User</h2>

    <form th:action="@{/users/save}" th:object="${userInputDTO}" method="post">

        <div>
            <label for="name">First Name:</label>
            <input type="text" id="name" th:field="*{name}" />
            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error">
        </span>
        </div>

        <br/>

        <div>
            <label for="lastname">Last Name:</label>
            <input type="text" id="lastname" th:field="*{lastname}" />
            <span th:if="${#fields.hasErrors('lastname')}" th:errors="*{lastname}" class="error">
        </span>
        </div>

        <br/>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" th:field="*{email}" />
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error">
        </span>
        </div>

        <br/>

        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" th:field="*{password}" />
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error">
        </span>
        </div>

        <div>
            <label for="confirmPassword">Confirm password:</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" />
            <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error"></span>
        </div>

        <br/>

        <button type="submit">Save</button>

    </form>
</div>

</body>
</html>
